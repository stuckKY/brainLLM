services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./documents:/app/documents
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brainllm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d brainllm"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
